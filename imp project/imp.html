<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            box-sizing: border-box;
        }
        html,body{
            width: 100%;
            height: 100%;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-2xl bg-white shadow-2xl rounded-2xl p-8 space-y-6">
      <header class="text-center">
        <h1 class="text-3xl font-bold text-gray-800">GitHub User Finder</h1>
        <p class="text-gray-500 text-sm mt-1">Enter a GitHub username to fetch their public data</p>
      </header>
  
      <form class="flex flex-col sm:flex-row items-center gap-4">
        <input
          type="text"
          placeholder="e.g., octocat"
          class="usernameinp w-full sm:flex-1 px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <button
          type="submit"
          class="search px-6 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition duration-200 font-medium"
        >
          Search
        </button>
      </form>
  
      <section class="hidden" id="user-data">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 items-center">
         
  
      
    <script src="imp.js"></script>
</body>
</html>
